    <main>
        <label>Nombre:</label>
        <input type="text" placeholder="Escribe tu nombre. Ej.: Matías" required>
        <br>
        <label>Apellido:</label>
        <input type="text" placeholder="Escribe tu apellido. Ej.: González" required>
        <br>
        <label>Fecha de Nacimiento:</label>
        <input type="date" requirede>
        <br>
        <label>Número de teléfono:</label>
        <input type="Número de teléfono." min="10" max="20" required>
        <br>
        <label>Inglés básico</label>
        <input type="checkbox" name="inglés">
        <br>
        <label>Educación nivel primario</label>
        <input type="checkbox" name="primario">
        <br>
        <label>Educación nivel secundario</label>
        <input type="checkbox" name="secundario">
        <br>
        <label>Estudios profesionales</label>
        <input type="checkbox" name="facultad">
        <br>
        <label>Carrera estudiada:</label>
        <input type="text" placeholder="Escribe la carrera que has estudiado." required>
        <br>
        <button type="submit">Enviar Datos</button>
        <br>
        <a href="index.html">

</a>
