<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="5 - Pág. de Formulario.css">
</head>
<body>

    <header>

        <h1>FORMULARIOS</h1>

        <a href="0 - Index.html" class="logo">
            <img src="images-removebg-preview.png" alt="Logo Instituto Politécnico Modelo">
        </a>

    </header>

    <main>

        <form action="#" method="get" class="caja-resaltada">

            <div class="campo">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombrefor" required>
            </div>
            
            <div class="campo">
                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellidofor" required>
            </div>
            
            <div class="campo">
                <label for="segnombre">Segundo nombre:</label>
                <input type="text" id="segnombre" name="segnombrefor">
            </div>
            
            <div class="campo">
                <label for="segapellido">Segundo apellido:</label>
                <input type="text" id="segapellido" name="segapellidofor">
            </div>

            <div class="campo">
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="emailfor" required>
            </div>

            <div class="campo">
                <label for="fechanacimiento">Ingrese su fecha de nacimiento:</label>
                <input type="date" id="fechanacimiento" name="fechanacimientofor" required>
            </div>

            <div>
                <select name="género" required>
                <option>Masculino</option>
                <option>Femenino</option>
                <option>Otro</option>
                </select>
            </div>

            <div>
                <select name="educación" required>
                <option>Solo primario</option>
                <option>Solo primario y secundario</option>
                <option>Primario, secundario y estudios profesionales</option>
                </select>
            </div>

            <div>
                <button type="submit">Enviar solicitud</button>
            </div>

        </form>

    </main>

    <footer>
        
        <ul>
            <li>Instagram: @ags.abello</li>
            <li>Contacto: +54 9 11 5109 4803</li>
            <li>&copy; 2026 ESTA PÁGINA ESTÁ PROTEGIDA BAJO DERECHOS DE AUTOR</li>
        </ul>

    </footer>
    
</body>
</html>
